groups:
# ============================================================
# API Service Burn Rate Alerts (SLO: 99.5%)
# ============================================================
- name: api-slo
  rules:
  - alert: API_BurnRate_Tier1_Urgent
    expr: |
      (sum(rate(http_requests_fail_total[1h])) / sum(rate(http_requests_total[1h]))) / (1 - 0.995) >= 2.88
      AND
      (sum(rate(http_requests_fail_total[5m])) / sum(rate(http_requests_total[5m]))) / (1 - 0.995) >= 2.88
    labels:
      severity: page
      tier: "1"
      service: api
    annotations:
      summary: "API burn rate ≥ 2.88 (consuming 2% budget in 1h)"
      description: "Urgent: API error rate burning SLO budget at 2.88× normal rate"
      
  - alert: API_BurnRate_Tier2_Page
    expr: |
      (sum(rate(http_requests_fail_total[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.995) >= 1.2
      AND
      (sum(rate(http_requests_fail_total[30m])) / sum(rate(http_requests_total[30m]))) / (1 - 0.995) >= 1.2
    labels:
      severity: page
      tier: "2"
      service: api
    annotations:
      summary: "API burn rate ≥ 1.2 (consuming 5% budget in 6h)"
      
  - alert: API_BurnRate_Tier3_Ticket
    expr: |
      (sum(rate(http_requests_fail_total[3d])) / sum(rate(http_requests_total[3d]))) / (1 - 0.995) >= 0.2
      AND
      (sum(rate(http_requests_fail_total[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.995) >= 0.2
    labels:
      severity: ticket
      tier: "3"
      service: api
    annotations:
      summary: "API burn rate ≥ 0.2 (consuming 10% budget in 3 days)"

