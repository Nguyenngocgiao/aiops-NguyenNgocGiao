services:
  frontend:
    image: python:3.10-slim
    ports:
      - "80:8080"
    command: >
      python -c '
      import http.server, socketserver, random
      class MetricHandler(http.server.SimpleHTTPRequestHandler):
          def do_GET(self):
              if self.path == "/metrics":
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.end_headers()
                  self.wfile.write(f"http_requests_total {random.randint(10, 50)}\ncontainer_memory_usage_bytes {random.randint(40000000, 60000000)}\n".encode())
              else:
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b"OK")
      socketserver.TCPServer(("", 8080), MetricHandler).serve_forever()
      '

