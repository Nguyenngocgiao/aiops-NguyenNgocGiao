  # --- DATABASES & INFRA ---
  payment-db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: dummy

  inventory-db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: dummy

  cache-svc:
    image: redis:alpine

  log-collector:
    image: alpine
    command: sleep infinity

  aiops-pipeline:
    image: python:3.10-slim
    ports:
      - "8000:8000"
    volumes:
      - ./aiops_engine:/app
    working_dir: /app
    command: bash -c "pip install fastapi uvicorn pyyaml requests && uvicorn main:app --host 0.0.0.0 --port 8000"

  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus_targets.yml:/etc/prometheus/prometheus.yml
